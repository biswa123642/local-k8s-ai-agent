apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-k8s-ai-agent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MaryamTavakkoli/local-k8s-ai-agent.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-devops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
