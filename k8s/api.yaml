apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-api
  namespace: ai-devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-devops-api
  template:
    metadata:
      labels:
        app: ai-devops-api
    spec:
      containers:
        - name: api
          image: maryamtavakkoli/local-k8s-ai-agent:v1
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_URL
              value: "http://ollama:11434"
            - name: MODEL
              value: "mistral"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-devops-api
  namespace: ai-devops
spec:
  selector:
    app: ai-devops-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-devops-ingress
  namespace: ai-devops
spec:
  rules:
    - host: ai-devops.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-devops-api
                port:
                  number: 80
