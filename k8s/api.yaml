apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-api
  namespace: ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-api-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "configmaps", "namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-api-reader
subjects:
  - kind: ServiceAccount
    name: ai-api
    namespace: ai
roleRef:
  kind: ClusterRole
  name: ai-api-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-api
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-api
  template:
    metadata:
      labels:
        app: ai-api
    spec:
      serviceAccountName: ai-api
      containers:
        - name: ai-agent
          image: ai-agent
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_URL
              value: "http://ollama:11434"
            - name: MODEL
              value: "mistral"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-api
  namespace: ai
spec:
  selector:
    app: ai-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
