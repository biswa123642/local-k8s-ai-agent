name: K8s-AI-Agent

on:
  workflow_dispatch:
  push:
    branches: 
    - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3.0.0

      - name: Set up QEMU for cross-arch builds
        run: docker run --privileged --rm tonistiigi/binfmt:latest --install all

      - name: Set up Buildx
        run: |
          docker buildx create --name multiarch --use
          docker buildx inspect --bootstrap

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build And Push
        uses: docker/build-push-action@v5.0.0
        with:
          context: "{{defaultContext}}"
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ai-agent:${{github.run_number}}

  deploy:
    needs: [ build ]
    runs-on: ubuntu-latest   
    steps:
    - name: Check out the repo
      uses: actions/checkout@v4

    - name: Install Azure CLI
      run: |
        curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

    - name: Login To Azure
      run: |
        echo "Logging into Azure with service principal..."
        az login --service-principal \
          --username ${{ secrets.AZURE_CLIENT_ID }} \
          --password ${{ secrets.AZURE_CLIENT_SECRET }} \
          --tenant ${{ secrets.AZURE_TENANT_ID }}
        az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        echo "Azure login successful"

    - name: Login To AKS
      uses: azure/aks-set-context@v5
      with:
        resource-group: ${{ secrets.RESOURCE_GROUP }}
        cluster-name: ${{ secrets.CLUSTER_NAME }}

    - name: Install Kustomize
      uses: imranismail/setup-kustomize@v2

    - name: Install Kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

    - name: Create Deployment
      working-directory: "k8s"
      run: |
        kustomize edit set image ai-agent=*:${{github.run_number}}
        kustomize build . | kubectl apply -n sitecore -f -
