name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t "${{ secrets.DOCKERHUB_USERNAME }}/local-k8s-ai-agent:${{ steps.sha.outputs.short }}" .

      - name: Push image
        run: docker push "${{ secrets.DOCKERHUB_USERNAME }}/local-k8s-ai-agent:${{ steps.sha.outputs.short }}"

      - name: Summary
        run: |
          {
            echo "### Image pushed"
            echo ""
            echo "\`${{ secrets.DOCKERHUB_USERNAME }}/local-k8s-ai-agent:${{ steps.sha.outputs.short }}\`"
            echo ""
            echo "ArgoCD Image Updater should pick this up within ~2 minutes and update \`k8s/api.yaml\`."
          } >> "$GITHUB_STEP_SUMMARY"
